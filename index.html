<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <!-- Launched from the iOS/Android home screen, these drop the browser chrome
         (true fullscreen on iPhone Safari, which has no element-fullscreen API). -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TURON CITY" />
  <meta name="theme-color" content="#05060a" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/png" href="/car_logo.png" />
  <link rel="apple-touch-icon" href="/car_logo.png" />
  <title>TURON CITY</title>
  <style>
    :root {
      color-scheme: dark;
      /* Mobile control base scale – overridden dynamically by TouchControls' injectScaleVars */
      --tc-stick: clamp(52px, 22vmin, 160px);
      --tc-wheel: clamp(72px, 28vmin, 200px);
      --tc-btn: clamp(34px, 11vmin, 80px);
      --tc-btn-sm: clamp(26px, 8vmin, 56px);
      --tc-pedal-w: clamp(54px, 20vmin, 130px);
      --tc-pedal-h-gas: clamp(74px, 26vmin, 160px);
      --tc-pedal-h-brk: clamp(54px, 20vmin, 130px);
      --tc-gap-edge: clamp(6px, 2vmin, 28px);
      --tc-exit-btn: clamp(28px, 7vmin, 48px);
      --tc-steer-ind-h: calc(var(--tc-wheel) * 0.375);
      --tc-knob: calc(var(--tc-stick) * 0.45);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05060a;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      position: fixed;
      inset: 0;
      touch-action: none;
    }

    canvas {
      display: block;
      touch-action: none;
    }

    body {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }

    /* ── Portrait: "Ekranni buring" overlay ── */
    #rotate-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #05060a;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      color: #fff;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }

    #rotate-overlay .rotate-icon {
      font-size: clamp(48px, 15vw, 80px);
      animation: rotatePhone 1.6s ease-in-out infinite;
    }

    #rotate-overlay .rotate-text {
      font-size: clamp(14px, 4vw, 20px);
      letter-spacing: 2px;
      color: rgba(84, 160, 255, 0.9);
      text-align: center;
      padding: 0 24px;
    }

    @keyframes rotatePhone {
      0% {
        transform: rotate(0deg);
      }

      40% {
        transform: rotate(-90deg);
      }

      60% {
        transform: rotate(-90deg);
      }

      100% {
        transform: rotate(0deg);
      }
    }

    @media (orientation: portrait) and (pointer: coarse) {
      #rotate-overlay {
        display: flex;
      }

      #app {
        visibility: hidden;
      }
    }
  </style>
</head>

<body>
  <div id="rotate-overlay">
    <div class="rotate-icon">📱</div>
    <div class="rotate-text">EKRANNI HORIZONTAL QILING</div>
    <div class="rotate-text" style="font-size:clamp(11px,3vw,15px);opacity:0.55;margin-top:-12px;">O'yin faqat landscape
      rejimda ishlaydi</div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
