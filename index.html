<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <!-- Launched from the iOS/Android home screen, these drop the browser chrome
         (true fullscreen on iPhone Safari, which has no element-fullscreen API). -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TURON CITY" />
  <meta name="theme-color" content="#05060a" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/png" href="/car_logo.png" />
  <link rel="apple-touch-icon" href="/car_logo.png" />
  <title>TURON CITY</title>
  <style>
    :root {
      color-scheme: dark;
      /* Mobile control base scale – overridden dynamically by TouchControls' injectScaleVars */
      --tc-stick: clamp(52px, 22vmin, 160px);
      --tc-wheel: clamp(72px, 28vmin, 200px);
      --tc-btn: clamp(34px, 11vmin, 80px);
      --tc-btn-sm: clamp(26px, 8vmin, 56px);
      --tc-pedal-w: clamp(54px, 20vmin, 130px);
      --tc-pedal-h-gas: clamp(74px, 26vmin, 160px);
      --tc-pedal-h-brk: clamp(54px, 20vmin, 130px);
      --tc-gap-edge: clamp(6px, 2vmin, 28px);
      --tc-exit-btn: clamp(28px, 7vmin, 48px);
      --tc-steer-ind-h: calc(var(--tc-wheel) * 0.375);
      --tc-knob: calc(var(--tc-stick) * 0.45);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05060a;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      position: fixed;
      inset: 0;
      touch-action: none;
    }

    canvas {
      display: block;
      touch-action: none;
    }

    body {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }

    /* ── Portrait: sahifani majburan landscape holatga o'girish ── */
    @media (orientation: portrait) and (pointer: coarse) {

      html,
      body {
        transform: rotate(90deg);
        transform-origin: left top;
        width: 100vh !important;
        height: 100vw !important;
        min-height: unset !important;
        position: fixed !important;
        top: 100%;
        left: 0;
        overflow: hidden !important;
        background: #05060a;
      }

      #app {
        width: 100vh !important;
        height: 100vw !important;
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
